name: PR

# Phase-2 deliverable per spec-production-readiness-hardening §5.8.
# Required-to-merge gates land here. Playwright is non-blocking
# initially; promoted to blocking in Session 17 once stable.

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile

  typecheck:
    name: Typecheck
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Typecheck (api)
        run: pnpm --filter @gatewaze/api typecheck
      - name: Typecheck (shared)
        run: pnpm --filter @gatewaze/shared typecheck
      # admin / portal typecheck is non-blocking until phase-4 cleanup.
      - name: Typecheck (admin / portal — non-blocking)
        run: pnpm --filter @gatewaze/admin typecheck && pnpm --filter @gatewaze/portal typecheck
        continue-on-error: true

  lint:
    name: Lint
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r lint

  test:
    name: Vitest
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: api tests
        run: pnpm --filter @gatewaze/api test
      - name: shared tests
        run: pnpm --filter @gatewaze/shared test
      - name: portal tests
        run: pnpm --filter @gatewaze/portal test
      - name: admin tests
        run: pnpm --filter @gatewaze/admin test

  shell-audit:
    name: Shell-call audit
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: scripts/audit-shell-calls.ts
        run: pnpm exec tsx scripts/audit-shell-calls.ts

  audit:
    name: pnpm audit (high+)
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: pnpm audit
        run: pnpm audit --prod --audit-level=high

  pgtap:
    name: pgTAP RLS tests
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start Supabase
        run: supabase start
      - name: Run pgTAP suites
        run: supabase test db
      - name: Stop Supabase
        if: always()
        run: supabase stop

  e2e:
    name: Playwright (non-blocking)
    needs: [setup]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Build admin
        run: pnpm --filter @gatewaze/admin build
      - name: Run E2E
        run: pnpm exec playwright test
        env:
          CI: 'true'
