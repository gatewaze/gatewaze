name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push admin image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/admin/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/gatewaze/admin:${{ steps.version.outputs.VERSION }}
            ghcr.io/gatewaze/admin:latest
          no-cache: true
          # The Dockerfile pre-builds the admin Vite bundle at image
          # build time using a superset of common module sources so
          # pod cold-starts can skip the 3-5 min runtime rebuild. The
          # prebuild step needs `git clone` access to the (private)
          # premium-gatewaze-modules + lf-gatewaze-modules repos.
          # Pass CI's GITHUB_TOKEN as a build-arg. If the build-arg is
          # missing or clones fail, the Dockerfile's graceful wrapper
          # falls the image back to pre-prebuild behaviour (runtime
          # build) without breaking the image build itself.
          build-args: |
            BUILD_TIME_GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}

      - name: Build and push portal image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/portal/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/gatewaze/portal:${{ steps.version.outputs.VERSION }}
            ghcr.io/gatewaze/portal:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/gatewaze/api:${{ steps.version.outputs.VERSION }}
            ghcr.io/gatewaze/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/worker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/gatewaze/worker:${{ steps.version.outputs.VERSION }}
            ghcr.io/gatewaze/worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push scheduler image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/scheduler/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/gatewaze/scheduler:${{ steps.version.outputs.VERSION }}
            ghcr.io/gatewaze/scheduler:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
