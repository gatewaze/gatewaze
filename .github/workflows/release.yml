name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push admin image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/admin/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/gatewaze/admin:${{ steps.version.outputs.VERSION }}
            ghcr.io/gatewaze/admin:latest
          no-cache: true
          # The Dockerfile pre-builds the admin Vite bundle at image
          # build time using a superset of module sources so pod
          # cold-starts can skip the 3-5 min runtime rebuild.
          #
          # We MUST use a PAT (GH_PAT_MODULES), not the auto-token —
          # `secrets.GITHUB_TOKEN` only grants access to the current
          # repo, so it CANNOT clone the private
          # gatewaze-modules. v1.2.28 was built with the
          # auto-token; the premium clone failed silently and the
          # bundle shipped without any premium modules (every
          # event-* module disappeared from the admin UI). The PAT
          # has read access to all three module repos.
          build-args: |
            BUILD_TIME_GITHUB_TOKEN=${{ secrets.GH_PAT_MODULES }}

      - name: Build and push portal image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/portal/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/gatewaze/portal:${{ steps.version.outputs.VERSION }}
            ghcr.io/gatewaze/portal:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Portal now bakes module npm deps at build time (mirrors
          # the api + worker + admin pattern). The Dockerfile clones
          # BUILD_TIME_MODULE_SOURCES and aggregates their declared
          # deps into the workspace install so `next build` at pod
          # startup can resolve module-side packages without a
          # per-pod aggregate-and-install. PAT, not auto-token,
          # because premium-gatewaze-modules is private.
          build-args: |
            BUILD_TIME_GITHUB_TOKEN=${{ secrets.GH_PAT_MODULES }}

      - name: Build and push api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/gatewaze/api:${{ steps.version.outputs.VERSION }}
            ghcr.io/gatewaze/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # The Dockerfile bakes module npm deps (openai for the AI
          # module, ws for editor-ai-copilot, etc.) at build time so
          # pod startup doesn't have to do per-module pnpm installs.
          # Mirrors the admin build — PAT, not auto-token, because
          # gatewaze-modules + lf-gatewaze-modules are private.
          build-args: |
            BUILD_TIME_GITHUB_TOKEN=${{ secrets.GH_PAT_MODULES }}

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/worker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/gatewaze/worker:${{ steps.version.outputs.VERSION }}
            ghcr.io/gatewaze/worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Worker bakes module npm deps at build time (same reason
          # as the api image) — it dispatches BullMQ jobs to module-
          # side handlers that require() module-declared deps like
          # `openai`. Needs the PAT, not the auto-token, to clone the
          # private gatewaze-modules + lf-gatewaze-modules.
          build-args: |
            BUILD_TIME_GITHUB_TOKEN=${{ secrets.GH_PAT_MODULES }}

      - name: Build and push scheduler image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/scheduler/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/gatewaze/scheduler:${{ steps.version.outputs.VERSION }}
            ghcr.io/gatewaze/scheduler:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Scheduler dynamic-imports each module's scheduler handler
          # via loadModules() at startup; same dep-resolution issue
          # as the api + worker.
          build-args: |
            BUILD_TIME_GITHUB_TOKEN=${{ secrets.GH_PAT_MODULES }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
