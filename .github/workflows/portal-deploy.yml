name: Portal Deploy (Cloudflare Workers)

# Per spec-portal-on-cloudflare-workers §7.2.
#
# Builds the AAIF portal with OpenNext and deploys it to a Cloudflare
# Worker. Module repos are cloned at the SHAs pinned in
# packages/portal/modules.json — bumping a SHA there is the explicit
# changelog entry for what changes in the next deploy.
#
# Triggers:
#   - git tag portal-v* (production)
#   - workflow_dispatch with environment selector (manual / staging)
#
# Secrets required (Repository Settings → Secrets):
#   GH_PAT_MODULES        PAT with read access to the three module repos
#                         (same secret already used by release.yml; the
#                         auto-token cannot clone private repos).
#   CF_API_TOKEN          Cloudflare API token with permissions:
#                           Account → Workers Scripts → Edit
#                           Account → Workers KV Storage → Edit
#                           Account → Workers R2 Storage → Edit
#                           Zone (aaif.live) → Workers Routes → Edit
#   CF_ACCOUNT_ID         Cloudflare account ID
#   PORTAL_SUPABASE_ANON_KEY        Supabase anon key for AAIF
#   PORTAL_SUPABASE_JWT_SECRET      JWT secret (only if Worker verifies JWTs locally)

on:
  push:
    tags:
      - 'portal-v*'
  workflow_dispatch:
    # Single Worker only (no [env.staging] block). Wrangler 4's
    # `workers/services/<name>/environments` API trips a "No route"
    # error on this account so multi-env deploys are off the table
    # until we sort out the underlying plan / wrangler-version issue.
    # Until then the Worker sits at `<name>.<account>.workers.dev` and
    # the operator adds the `aaif.live` route by hand once smoke-tested.

permissions:
  contents: read

jobs:
  deploy:
    name: Build & Deploy Portal Worker
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      # Force the next.config.ts OpenNext branch (custom image loader,
      # no `output: standalone`).
      OPENNEXT_BUILD: '1'
      # Pod-startup module discovery is disabled in the Workers build —
      # the next.config webpack alias reads from the registry JSON
      # written by `pnpm --filter portal generate-modules`. The clone
      # step below populates the disk paths it expects.
      MODULE_SOURCES: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Clone module repos at pinned SHAs
        env:
          GH_PAT: ${{ secrets.GH_PAT_MODULES }}
        run: |
          # Read packages/portal/modules.json and clone each repo at
          # the pinned SHA into the sibling layout that the portal
          # webpack alias expects (../../../<repo>/modules).
          set -euo pipefail
          node -e '
            const fs = require("node:fs");
            const cp = require("node:child_process");
            const cfg = JSON.parse(fs.readFileSync("packages/portal/modules.json", "utf8"));
            const token = process.env.GH_PAT || "";
            for (const [name, { url, sha }] of Object.entries(cfg.modules)) {
              const target = `${process.cwd()}/../${name}`;
              // Inject PAT into the URL so private repos clone. Only
              // works for HTTPS URLs — SSH URLs would need a deploy key.
              const authedUrl = token && url.startsWith("https://github.com/")
                ? url.replace("https://github.com/", `https://x-token:${token}@github.com/`)
                : url;
              console.log(`[modules] cloning ${name} @ ${sha.slice(0,7)}`);
              cp.execSync(`git clone --filter=blob:none --no-checkout ${authedUrl} ${target}`, { stdio: "inherit" });
              cp.execSync(`git -C ${target} fetch --depth 1 origin ${sha}`, { stdio: "inherit" });
              cp.execSync(`git -C ${target} checkout ${sha}`, { stdio: "inherit" });
            }
          '

      - name: Install dependencies
        # `onlyBuiltDependencies` is pinned in the root package.json
        # ([esbuild, msgpackr-extract, sharp]) — pnpm 10 rejects
        # `--config.dangerously-allow-all-builds=true` when that's set
        # ("Cannot have both neverBuiltDependencies and
        # onlyBuiltDependencies"). The whitelist is the right answer
        # for CI; the dangerously-allow flag exists for the admin's
        # runtime entrypoint where the module set is unknown.
        run: pnpm install --frozen-lockfile

      - name: Build portal (Next.js)
        working-directory: packages/portal
        env:
          NEXT_TELEMETRY_DISABLED: '1'
        run: pnpm run build

      - name: Build OpenNext bundle
        working-directory: packages/portal
        run: pnpm run opennext:build

      - name: Deploy to Cloudflare Workers
        working-directory: packages/portal
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        # Single Worker, no environments. The kvIncrementalCache
        # override in open-next.config.ts is disabled (wrangler 4
        # bulk-PUT routing bug — see comment in that file), so OpenNext
        # skips the populate-cache step and the deploy is a plain
        # `wrangler deploy` of the bundle. ISR cache is degraded
        # but the Worker comes up.
        run: pnpm run opennext:deploy

      # Secret push happens AFTER the first deploy because
      # `wrangler secret put` 404s ("No route for that URI") if the
      # Worker doesn't exist yet — and the first deploy is what
      # creates it. From the second run onwards the order doesn't
      # matter (secrets are picked up live without a redeploy), but
      # the first cold deploy is briefly missing SUPABASE_ANON_KEY
      # — every request returns 503 until this step finishes.
      - name: Push Worker secrets
        working-directory: packages/portal
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          # `wrangler secret put` is idempotent — pushes the latest
          # value each run. Only push if the GitHub secret is set;
          # SUPABASE_JWT_SECRET is optional (Worker only needs it if
          # we move JWT verification off the API).
          if [ -n "${{ secrets.PORTAL_SUPABASE_ANON_KEY }}" ]; then
            printf '%s' "${{ secrets.PORTAL_SUPABASE_ANON_KEY }}" | npx wrangler secret put SUPABASE_ANON_KEY
          fi
          if [ -n "${{ secrets.PORTAL_SUPABASE_JWT_SECRET }}" ]; then
            printf '%s' "${{ secrets.PORTAL_SUPABASE_JWT_SECRET }}" | npx wrangler secret put SUPABASE_JWT_SECRET
          fi

      - name: Smoke test
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        # No `[[routes]]` in wrangler.toml on the v0 deploy, so the
        # Worker is reachable only at its workers.dev hostname
        # (`<name>.<account-subdomain>.workers.dev`). The account
        # subdomain isn't trivially derivable from the account ID via
        # the API, so smoke is a soft check: confirms the Worker
        # script exists via the Cloudflare API rather than hitting
        # HTTP directly. Manual smoke via the dashboard URL is the
        # follow-up before the operator adds the aaif.live route.
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts/gatewaze-portal-aaif" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}")
          if [ "${status}" = "200" ]; then
            echo "[smoke] Worker script gatewaze-portal-aaif registered"
          else
            echo "[smoke] FAIL — Worker script API returned ${status}" >&2
            exit 1
          fi
