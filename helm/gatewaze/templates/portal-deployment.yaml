apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gatewaze.fullname" . }}-portal
  labels:
    {{- include "gatewaze.labels" . | nindent 4 }}
    app.kubernetes.io/component: portal
spec:
  replicas: {{ .Values.replicaCount.portal }}
  selector:
    matchLabels:
      {{- include "gatewaze.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: portal
  template:
    metadata:
      labels:
        {{- include "gatewaze.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: portal
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "gatewaze.serviceAccountName" . }}
      containers:
        - name: portal
          image: "{{ .Values.image.registry }}/portal:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3100
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "gatewaze.fullname" . }}-config
            - secretRef:
                name: {{ include "gatewaze.fullname" . }}-secret
            {{- with .Values.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: PORT
              value: "3100"
          # Portal runs `next build` at pod startup so it can include
          # premium module event-pages that aren't available at image
          # build time. Builds typically finish in 2-5 min; the startup
          # probe handles that window before liveness/readiness take over.
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            # 60 * 10s = 10 min ceiling before the container is considered unhealthy
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources.portal | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gatewaze.fullname" . }}-portal
  labels:
    {{- include "gatewaze.labels" . | nindent 4 }}
    app.kubernetes.io/component: portal
spec:
  type: ClusterIP
  # Each portal replica runs `next build` at pod startup, so chunk hashes
  # can diverge across replicas. Pin clients to a single backend so lazy-
  # loaded chunks stay on the pod that served the entry HTML. Same
  # treatment the admin Service has for the same reason.
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
  ports:
    - port: 3100
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "gatewaze.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: portal
