{{- if .Values.backup.enabled }}
# pgbackrest daily-full + 5-min-WAL backup CronJob per spec §5.5.
# Operator must populate backup.s3 with credentials + bucket.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "gatewaze.fullname" . }}-backup
  labels:
    {{- include "gatewaze.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
spec:
  schedule: {{ .Values.backup.schedule | default "0 2 * * *" | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 7
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pgbackrest
              image: {{ .Values.backup.image | default "pgbackrest/pgbackrest:latest" | quote }}
              command: ["pgbackrest", "--stanza=gatewaze", "backup"]
              env:
                - name: PGBACKREST_REPO1_TYPE
                  value: s3
                - name: PGBACKREST_REPO1_S3_BUCKET
                  value: {{ .Values.backup.s3.bucket | quote }}
                - name: PGBACKREST_REPO1_S3_ENDPOINT
                  value: {{ .Values.backup.s3.endpoint | quote }}
                - name: PGBACKREST_REPO1_S3_REGION
                  value: {{ .Values.backup.s3.region | quote }}
                - name: PGBACKREST_REPO1_S3_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.backup.s3.secretName | quote }}
                      key: access_key
                - name: PGBACKREST_REPO1_S3_KEY_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.backup.s3.secretName | quote }}
                      key: secret_key
                - name: PGBACKREST_PG1_HOST
                  value: {{ .Values.backup.postgres.host | quote }}
                - name: PGBACKREST_PG1_PORT
                  value: {{ .Values.backup.postgres.port | default "5432" | quote }}
                - name: PGBACKREST_PG1_USER
                  value: {{ .Values.backup.postgres.user | default "postgres" | quote }}
                - name: PGBACKREST_PG1_DATABASE
                  value: {{ .Values.backup.postgres.database | default "postgres" | quote }}
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.backup.postgres.secretName | quote }}
                      key: password
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
{{- end }}
