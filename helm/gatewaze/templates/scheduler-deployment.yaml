apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gatewaze.fullname" . }}-scheduler
  labels:
    {{- include "gatewaze.labels" . | nindent 4 }}
    app.kubernetes.io/component: scheduler
spec:
  replicas: {{ .Values.replicaCount.scheduler }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "gatewaze.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: scheduler
  template:
    metadata:
      labels:
        {{- include "gatewaze.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: scheduler
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "gatewaze.serviceAccountName" . }}
      containers:
        - name: scheduler
          image: "{{ .Values.image.registry }}/api:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.scheduler.healthCheck.enabled }}
          # Override CMD to the new TS-compiled scheduler. This is
          # paired with healthCheck.enabled because the new scheduler
          # depends on module-defined `crons[]` config and only exposes
          # the /ready probes the chart references. Brands still on
          # legacy `schedulers[]` (in-process cron) must leave the
          # image's default CMD in place by setting
          # `scheduler.healthCheck.enabled: false`.
          command: ["node", "packages/api/dist/scheduler/start-scheduler.js"]
          {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.scheduler.metricsPort | default 9091 }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "gatewaze.fullname" . }}-config
            - secretRef:
                name: {{ include "gatewaze.fullname" . }}-secret
            {{- with .Values.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.scheduler.healthCheck.enabled }}
          startupProbe:
            httpGet:
              path: /ready
              port: metrics
            failureThreshold: 30
            periodSeconds: 1
            timeoutSeconds: 1
          readinessProbe:
            httpGet:
              path: /ready
              port: metrics
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /ready
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          {{- end }}
          resources:
            {{- toYaml .Values.resources.scheduler | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
