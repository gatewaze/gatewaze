apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gatewaze.fullname" . }}-worker
  labels:
    {{- include "gatewaze.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.replicaCount.worker }}
  selector:
    matchLabels:
      {{- include "gatewaze.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "gatewaze.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "gatewaze.serviceAccountName" . }}
      containers:
        - name: worker
          image: "{{ .Values.image.registry }}/worker:{{ include "gatewaze.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.worker.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.worker.metricsPort | default 9090 }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "gatewaze.fullname" . }}-config
            - secretRef:
                name: {{ include "gatewaze.fullname" . }}-secret
            {{- with .Values.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.scraplingFetcher.enabled }}
          # spec-scrapling-fetcher-service.md §4.2 — adapter calls these
          # to reach the new Python service. Service is reached via the
          # ClusterIP service in the same namespace.
          env:
            - name: SCRAPLING_FETCHER_URL
              value: "http://{{ include "gatewaze.fullname" . }}-scrapling-fetcher:8080"
            - name: SCRAPLING_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "gatewaze.fullname" . }}-scrapling-fetcher-secrets
                  key: internalToken
          {{- end }}
          {{- if .Values.worker.healthCheck.enabled }}
          # Startup probe: gives the worker time to load modules,
          # register handlers, and open Postgres LISTEN channels before
          # the readiness/liveness checks start failing it. /ready flips
          # to 200 only after registerModuleQueues() resolves.
          #
          # These probes only work against the new TS-compiled worker
          # (packages/api/src/workers/job-worker.ts), which exposes
          # /ready on the metrics port. The image's default CMD still
          # runs the legacy scripts/workers/job-worker.js — that worker
          # has no HTTP surface at all and probes against it 404.
          # Brands still on the legacy entrypoint must set
          # `worker.healthCheck.enabled: false` until handler / cron
          # migration to module-defined queues completes.
          startupProbe:
            httpGet:
              path: /ready
              port: metrics
            failureThreshold: 30
            periodSeconds: 1
            timeoutSeconds: 1
          readinessProbe:
            httpGet:
              path: /ready
              port: metrics
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /ready
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          {{- end }}
          resources:
            {{- toYaml .Values.resources.worker | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
