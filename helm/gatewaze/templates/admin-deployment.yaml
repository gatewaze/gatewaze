apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gatewaze.fullname" . }}-admin
  labels:
    {{- include "gatewaze.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin
spec:
  replicas: {{ .Values.replicaCount.admin }}
  selector:
    matchLabels:
      {{- include "gatewaze.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: admin
  template:
    metadata:
      labels:
        {{- include "gatewaze.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: admin
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "gatewaze.serviceAccountName" . }}
      containers:
        - name: admin
          image: "{{ .Values.image.registry }}/admin:{{ include "gatewaze.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "gatewaze.fullname" . }}-config
            - secretRef:
                name: {{ include "gatewaze.fullname" . }}-secret
            {{- with .Values.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 300
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 240
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 10
          resources:
            {{- toYaml .Values.resources.admin | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gatewaze.fullname" . }}-admin
  labels:
    {{- include "gatewaze.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin
spec:
  type: ClusterIP
  # Each admin replica builds its own Vite bundle at pod startup (the
  # admin Docker entrypoint runs `vite build`). If two replicas' clones
  # produce different content hashes, their lazy-loaded chunk filenames
  # diverge — a client that loads index.html from pod A then fetches a
  # chunk from pod B hits 404. Pin each client to a single backend so
  # chunk requests stay on the pod that served their entry bundle.
  # Proper fix: build once at image build time. See docker/admin/Dockerfile.
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "gatewaze.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: admin
