apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gatewaze.fullname" . }}-config
  labels:
    {{- include "gatewaze.labels" . | nindent 4 }}
data:
  NODE_ENV: "production"
  PORT: "3002"
  PORTAL_PORT: "3100"

  # Supabase
  SUPABASE_URL: {{ .Values.supabase.url | quote }}
  NEXT_PUBLIC_SUPABASE_URL: {{ .Values.supabase.url | quote }}
  VITE_SUPABASE_URL: {{ .Values.supabase.url | quote }}

  # Email
  EMAIL_PROVIDER: {{ .Values.email.provider | quote }}
  EMAIL_FROM: {{ .Values.email.from | quote }}
  SMTP_HOST: {{ .Values.email.smtp.host | quote }}
  SMTP_PORT: {{ .Values.email.smtp.port | quote }}

  # Auth
  AUTH_PROVIDER: {{ .Values.auth.provider | quote }}
  {{- if eq .Values.auth.provider "oidc" }}
  OIDC_ISSUER_URL: {{ .Values.auth.oidc.issuerUrl | quote }}
  OIDC_CLIENT_ID: {{ .Values.auth.oidc.clientId | quote }}
  OIDC_SCOPES: {{ .Values.auth.oidc.scopes | quote }}
  OIDC_CALLBACK_URL: {{ .Values.auth.oidc.callbackUrl | quote }}
  {{- end }}

  # Hostnames (for middleware known-host detection and frontend URLs)
  {{- if .Values.ingress.enabled }}
  PORTAL_HOST: {{ .Values.ingress.hosts.portal | quote }}
  ADMIN_HOST: {{ .Values.ingress.hosts.admin | quote }}
  NEXT_PUBLIC_APP_URL: {{ printf "https://%s" .Values.ingress.hosts.portal | quote }}
  ADMIN_BASE_URL: {{ printf "https://%s" .Values.ingress.hosts.admin | quote }}
  VITE_API_URL: {{ printf "https://%s" .Values.ingress.hosts.api | quote }}
  {{- else }}
  VITE_API_URL: {{ printf "http://%s-api:3002" (include "gatewaze.fullname" .) | quote }}
  {{- end }}

  # Custom Domains module (env vars always set if config exists — needed by API even without controller)
  {{- if .Values.customDomains }}
  CUSTOM_DOMAINS_CNAME_TARGET: {{ .Values.customDomains.cnameTarget | default "" | quote }}
  CUSTOM_DOMAINS_EXPECTED_IP: {{ .Values.customDomains.expectedIp | default "" | quote }}
  CUSTOM_DOMAINS_CLUSTER_ISSUER: {{ .Values.customDomains.clusterIssuer | default "letsencrypt-prod" | quote }}
  {{- end }}

  # Module sources (comma-separated git URLs for admin startup clone)
  {{- if .Values.moduleSources }}
  MODULE_SOURCES: {{ .Values.moduleSources | quote }}
  # EXTRA_MODULE_SOURCES derived from MODULE_SOURCES for gatewaze.config.ts
  # Maps cloned repo paths to the format expected by the config
  EXTRA_MODULE_SOURCES: {{ .Values.extraModuleSources | default "" | quote }}
  {{- end }}
