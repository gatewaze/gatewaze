apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gatewaze.fullname" . }}-config
  labels:
    {{- include "gatewaze.labels" . | nindent 4 }}
data:
  NODE_ENV: "production"
  PORT: "3002"
  PORTAL_PORT: "3100"

  # Supabase
  SUPABASE_URL: {{ .Values.supabase.url | quote }}
  NEXT_PUBLIC_SUPABASE_URL: {{ .Values.supabase.url | quote }}
  VITE_SUPABASE_URL: {{ .Values.supabase.url | quote }}

  # Email
  EMAIL_PROVIDER: {{ .Values.email.provider | quote }}
  EMAIL_FROM: {{ .Values.email.from | quote }}
  SMTP_HOST: {{ .Values.email.smtp.host | quote }}
  SMTP_PORT: {{ .Values.email.smtp.port | quote }}

  # Auth
  AUTH_PROVIDER: {{ .Values.auth.provider | quote }}
  {{- if eq .Values.auth.provider "oidc" }}
  OIDC_ISSUER_URL: {{ .Values.auth.oidc.issuerUrl | quote }}
  OIDC_CLIENT_ID: {{ .Values.auth.oidc.clientId | quote }}
  OIDC_SCOPES: {{ .Values.auth.oidc.scopes | quote }}
  OIDC_CALLBACK_URL: {{ .Values.auth.oidc.callbackUrl | quote }}
  {{- end }}

  # Hostnames (for middleware known-host detection and frontend URLs)
  {{- if .Values.ingress.enabled }}
  PORTAL_HOST: {{ .Values.ingress.hosts.portal | quote }}
  ADMIN_HOST: {{ .Values.ingress.hosts.admin | quote }}
  NEXT_PUBLIC_APP_URL: {{ printf "https://%s" .Values.ingress.hosts.portal | quote }}
  ADMIN_BASE_URL: {{ printf "https://%s" .Values.ingress.hosts.admin | quote }}
  VITE_API_URL: {{ printf "https://%s" .Values.ingress.hosts.api | quote }}
  # Admin's Vite build reads VITE_PORTAL_URL to build RSVP links in
  # invite PDFs, party detail modals, QR codes, etc. Without it,
  # callers fall back to window.location.origin — which is the admin
  # subdomain, not the portal — and every RSVP link is broken.
  VITE_PORTAL_URL: {{ printf "https://%s" .Values.ingress.hosts.portal | quote }}
  {{- else }}
  VITE_API_URL: {{ printf "http://%s-api:3002" (include "gatewaze.fullname" .) | quote }}
  {{- end }}

  # Custom Domains module (env vars always set if config exists — needed by API even without controller)
  {{- if .Values.customDomains }}
  CUSTOM_DOMAINS_CNAME_TARGET: {{ .Values.customDomains.cnameTarget | default "" | quote }}
  CUSTOM_DOMAINS_EXPECTED_IP: {{ .Values.customDomains.expectedIp | default "" | quote }}
  CUSTOM_DOMAINS_CLUSTER_ISSUER: {{ .Values.customDomains.clusterIssuer | default "letsencrypt-prod" | quote }}
  {{- end }}

  # Module sources (comma-separated). Each entry is a git URL or a local
  # absolute path. Format: url[#branch=main&path=modules]. Git URLs are
  # cloned by the entrypoint; local paths are expected to be mounted at
  # the same absolute path by the deployment (dev only).
  {{- if .Values.moduleSources }}
  MODULE_SOURCES: {{ .Values.moduleSources | quote }}
  {{- end }}

  # Queue layer (BullMQ) — see spec-job-queue-redis-architecture §4.9.
  # Per-queue concurrency for built-in queues. Module-registered queues
  # are tuned via WORKER_CONCURRENCY_<MODULE_ID>_<QUEUE_NAME>; set those
  # under .Values.env if needed.
  WORKER_CONCURRENCY_JOBS: {{ .Values.queue.concurrency.jobs | default 2 | quote }}
  WORKER_CONCURRENCY_EMAIL: {{ .Values.queue.concurrency.email | default 5 | quote }}
  WORKER_CONCURRENCY_IMAGE: {{ .Values.queue.concurrency.image | default 5 | quote }}
  WORKER_METRICS_PORT: {{ .Values.worker.metricsPort | default 9090 | quote }}
  SCHEDULER_METRICS_PORT: {{ .Values.scheduler.metricsPort | default 9091 | quote }}
  LOG_LEVEL: {{ .Values.logLevel | default "info" | quote }}

  # Arbitrary extra env from values.yaml `env:` block. Passed through
  # verbatim so brand-specific keys (BRAND_ID, OPENAI_API_KEY,
  # BROWSERLESS_API_KEY, BRAVE_SEARCH_API_KEY, etc.) land in pods via the
  # same configMapRef the core keys above use. Values are quoted so
  # numeric/bool-looking strings survive unchanged.
  {{- range $key, $value := .Values.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
