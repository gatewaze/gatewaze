apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gatewaze.fullname" . }}-secret
  labels:
    {{- include "gatewaze.labels" . | nindent 4 }}
type: Opaque
data:
  # Supabase keys
  SUPABASE_ANON_KEY: {{ .Values.supabase.anonKey | b64enc | quote }}
  VITE_SUPABASE_ANON_KEY: {{ .Values.supabase.anonKey | b64enc | quote }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: {{ .Values.supabase.anonKey | b64enc | quote }}
  SUPABASE_SERVICE_ROLE_KEY: {{ .Values.supabase.serviceRoleKey | b64enc | quote }}
  JWT_SECRET: {{ .Values.supabase.jwtSecret | b64enc | quote }}

  # Database
  {{- if .Values.supabase.databaseUrl }}
  DATABASE_URL: {{ .Values.supabase.databaseUrl | b64enc | quote }}
  {{- end }}

  # Redis
  REDIS_URL: {{ include "gatewaze.redisUrl" . | b64enc | quote }}

  # Email secrets
  {{- if .Values.email.sendgridApiKey }}
  SENDGRID_API_KEY: {{ .Values.email.sendgridApiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.email.unsubscribeHmacSecret }}
  UNSUBSCRIBE_HMAC_SECRET: {{ .Values.email.unsubscribeHmacSecret | b64enc | quote }}
  {{- end }}
  {{- if .Values.email.smtp.user }}
  SMTP_USER: {{ .Values.email.smtp.user | b64enc | quote }}
  {{- end }}
  {{- if .Values.email.smtp.password }}
  SMTP_PASS: {{ .Values.email.smtp.password | b64enc | quote }}
  {{- end }}

  # OIDC secrets
  {{- if and (eq .Values.auth.provider "oidc") .Values.auth.oidc.clientSecret }}
  OIDC_CLIENT_SECRET: {{ .Values.auth.oidc.clientSecret | b64enc | quote }}
  {{- end }}

  # GitHub token for cloning private module repos
  {{- if .Values.githubToken }}
  GITHUB_TOKEN: {{ .Values.githubToken | b64enc | quote }}
  {{- end }}
