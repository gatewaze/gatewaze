{{- if .Values.database.poolingEnabled }}
# PgBouncer connection pool per spec §5.16 / §7.4 task 4.4. Required
# for ≥2 API replicas under load. Off by default; operators on
# single-replica cloud Supabase don't need it.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gatewaze.fullname" . }}-pgbouncer
  labels:
    {{- include "gatewaze.labels" . | nindent 4 }}
    app.kubernetes.io/component: pgbouncer
spec:
  replicas: {{ .Values.database.pgbouncer.replicas | default 2 }}
  selector:
    matchLabels:
      {{- include "gatewaze.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: pgbouncer
  template:
    metadata:
      labels:
        {{- include "gatewaze.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: pgbouncer
    spec:
      containers:
        - name: pgbouncer
          image: {{ .Values.database.pgbouncer.image | default "edoburu/pgbouncer:1.23" | quote }}
          ports:
            - name: pgbouncer
              containerPort: 5432
          env:
            - name: DB_HOST
              value: {{ .Values.database.host | quote }}
            - name: DB_PORT
              value: {{ .Values.database.port | default "5432" | quote }}
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.secretName | quote }}
                  key: user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.secretName | quote }}
                  key: password
            - name: POOL_MODE
              value: {{ .Values.database.pgbouncer.poolMode | default "transaction" | quote }}
            - name: MAX_CLIENT_CONN
              value: {{ .Values.database.pgbouncer.maxClientConn | default "1000" | quote }}
            - name: DEFAULT_POOL_SIZE
              value: {{ .Values.database.pgbouncer.defaultPoolSize | default "20" | quote }}
            - name: AUTH_TYPE
              value: scram-sha-256
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gatewaze.fullname" . }}-pgbouncer
  labels:
    {{- include "gatewaze.labels" . | nindent 4 }}
    app.kubernetes.io/component: pgbouncer
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    {{- include "gatewaze.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: pgbouncer
{{- end }}
