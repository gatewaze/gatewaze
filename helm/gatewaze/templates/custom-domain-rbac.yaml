{{- if and .Values.customDomains.enabled .Values.customDomains.rbac.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "gatewaze.fullname" . }}-domain-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gatewaze.labels" . | nindent 4 }}
    app.kubernetes.io/component: domain-controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "gatewaze.fullname" . }}-domain-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gatewaze.labels" . | nindent 4 }}
rules:
  # Manage Ingress resources for custom domains
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "create", "update", "delete"]
  # Read Certificate resources to check TLS provisioning status
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates"]
    verbs: ["get", "list"]
  # Read Secrets to verify TLS certificate existence
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "gatewaze.fullname" . }}-domain-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gatewaze.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "gatewaze.fullname" . }}-domain-controller
subjects:
  - kind: ServiceAccount
    name: {{ include "gatewaze.fullname" . }}-domain-controller
    namespace: {{ .Release.Namespace }}
{{- end }}
