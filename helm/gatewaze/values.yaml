###############################################################################
# Gatewaze Helm Chart — Default Values
###############################################################################

# -- Instance name used for resource naming
instanceName: gatewaze

# =============================================================================
# Container Images
# =============================================================================
image:
  registry: ghcr.io/gatewaze
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []

# -- Module sources (comma-separated git URLs cloned at admin startup)
# Format: url[@branch][#path] e.g. https://github.com/org/repo.git@main#modules
moduleSources: "https://github.com/gatewaze/gatewaze-modules.git@main#modules"

# =============================================================================
# Replica Counts
# =============================================================================
replicaCount:
  admin: 2
  portal: 2
  # v1.1 REQUIREMENT: API must be single-replica. Module subsystem uses
  # in-process mutexes for migration safety. Multi-replica support planned for v1.2.
  # DO NOT increase this value without implementing distributed locks.
  api: 1
  worker: 1
  scheduler: 1

# =============================================================================
# Supabase Configuration
# =============================================================================
supabase:
  # -- Mode: "self-hosted" or "cloud"
  mode: cloud

  # -- Supabase project URL
  url: ""

  # -- Supabase anonymous (public) key
  anonKey: ""

  # -- Supabase service role key (privileged)
  serviceRoleKey: ""

  # -- JWT secret for token signing/verification
  jwtSecret: ""

  # -- Direct database connection URL (required for cloud mode)
  databaseUrl: ""

# =============================================================================
# Redis Configuration
# =============================================================================
redis:
  # -- Deploy a Redis instance as part of the chart
  enabled: true

  # -- External Redis URL (used when redis.enabled is false)
  externalUrl: ""

  # -- Redis password
  password: gatewaze

  # -- Redis image
  image: redis:7-alpine

  # -- Redis storage size
  storageSize: 2Gi

  # -- Redis PVC storage class. Leave empty to use the cluster default.
  # Set explicitly (e.g. "linode-block-storage") if the cluster default
  # has Retain reclaim policy — redis here is a cache, so a Delete policy
  # avoids leaking volumes on every chart churn.
  storageClass: ""

  # -- Redis resource requests/limits
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# =============================================================================
# Authentication
# =============================================================================
auth:
  # -- Auth provider: "supabase" (default built-in) or "oidc"
  provider: supabase

  # -- OIDC configuration (when provider is "oidc")
  oidc:
    issuerUrl: ""
    clientId: ""
    clientSecret: ""
    scopes: "openid profile email"
    callbackUrl: ""

# =============================================================================
# Email Configuration
# =============================================================================
email:
  # -- Email provider: "smtp" or "sendgrid"
  provider: smtp

  # -- From address for outgoing emails
  from: "noreply@localhost"

  # -- SendGrid API key (when provider is "sendgrid")
  sendgridApiKey: ""

  # -- SMTP settings (when provider is "smtp")
  smtp:
    host: ""
    port: 587
    user: ""
    password: ""

# =============================================================================
# Ingress Configuration
# =============================================================================
ingress:
  # -- Enable ingress resource creation
  enabled: false

  # -- Ingress class name (e.g., "nginx", "traefik")
  className: nginx

  # -- Annotations for the ingress resource
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    # nginx.ingress.kubernetes.io/proxy-body-size: "50m"

  # -- Host configuration for each service
  hosts:
    admin: admin.example.com
    portal: events.example.com
    api: api.example.com

  # -- TLS configuration
  tls:
    enabled: false
    secretName: gatewaze-tls
    hosts:
      - admin.example.com
      - events.example.com
      - api.example.com

# =============================================================================
# Service Account
# =============================================================================
serviceAccount:
  # -- Create a service account
  create: true
  # -- Annotations for the service account
  annotations: {}
  # -- Service account name (auto-generated if empty)
  name: ""

# =============================================================================
# Resource Requests & Limits
# =============================================================================
resources:
  admin:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 3Gi

  portal:
    # Portal now runs `next build` at pod startup (see docker/portal),
    # so it needs enough memory for Next.js compilation. The steady-state
    # footprint is smaller — tune limits down after observing your brand.
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 3Gi

  api:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  worker:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  scheduler:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# =============================================================================
# Queue Layer (BullMQ)
# =============================================================================
# See spec-job-queue-redis-architecture.md §4.9 for tuning guidance.
# Module-registered queues use WORKER_CONCURRENCY_<MODULE>_<QUEUE> env vars
# (uppercased, non-alphanumeric → `_`). Add those under `env:` below.
queue:
  concurrency:
    jobs: 2
    email: 5
    image: 5

# -- Structured-log level for pino (fatal | error | warn | info | debug | trace)
logLevel: info

# =============================================================================
# Monitoring (Prometheus Operator integration)
# =============================================================================
# Renders PodMonitor resources so the Prometheus Operator scrapes the
# worker (port 9090) and scheduler (port 9091) /metrics endpoints
# directly. Requires the Prometheus Operator CRDs to be installed
# (kube-prometheus-stack or similar). Leave disabled if you run plain
# Prometheus or no Prometheus at all — the metrics endpoints still work
# regardless; this just registers them with the operator.
monitoring:
  enabled: false
  # -- Scrape interval for the operator
  interval: 30s
  # -- Per-scrape timeout
  scrapeTimeout: 10s
  # -- Extra labels added to the PodMonitor (e.g. release: kube-prometheus-stack
  # to match your Prometheus selector)
  additionalLabels: {}

# =============================================================================
# Pod Disruption Budgets (optional)
# =============================================================================
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# =============================================================================
# Node Selector, Tolerations, Affinity
# =============================================================================
nodeSelector: {}
tolerations: []
affinity: {}

# =============================================================================
# Extra env sources (for modules to inject their own ConfigMap / Secret
# without modifying this chart).
#
# Modules that need env vars in core pods (admin, api, portal, worker)
# create their own ConfigMap/Secret via their own Helm subchart, then
# the operator references them here. Example for prefect-worker:
#
# extraEnvFrom:
#   - configMapRef:
#       name: gatewaze-prefect-worker-config
#   - secretRef:
#       name: gatewaze-prefect-worker-secret
# =============================================================================
extraEnvFrom: []

# =============================================================================
# API Service Configuration
# =============================================================================
api:
  # Module system v1.1 configuration
  env:
    DISABLE_MODULE_UPLOAD: "true"  # recommended default for production
    GATEWAZE_DATA_DIR: "/var/lib/gatewaze"
    BULLMQ_PREFIX: "gatewaze"
    AUDIT_LOG_RETENTION_DAYS: "90"
    MODULE_MIGRATION_TIMEOUT_MS: "30000"
    MODULE_UPLOAD_MAX_FILE_BYTES: "10485760"
    MODULE_UPLOAD_MAX_TOTAL_BYTES: "209715200"
    # MODULE_GIT_ALLOWED_HOSTS: ""  # comma-separated, set to restrict git sources
    # GATEWAZE_CORS_ALLOWED_ORIGINS: ""  # comma-separated, set to enable CORS
    # EDGE_RUNTIME_RELOAD_URL: ""  # for local-filesystem edge deploy
    # EDGE_RUNTIME_RELOAD_TOKEN: ""  # shared secret for reload endpoint

  persistence:
    # -- Provision a PVC for module uploads / writable data. Disable to use
    # emptyDir (fine when DISABLE_MODULE_UPLOAD=true and nothing needs to
    # survive pod restarts).
    enabled: true
    size: 10Gi
    storageClass: ""  # use cluster default
    accessModes:
      - ReadWriteOnce
    # -- Where the volume is mounted in the container. This must match the
    # directory the app actually writes to (currently /app/data — multer
    # uploads and resolved module archives live under there).
    mountPath: /app/data

  # -- Pod-container securityContext for the api container. The api process
  # creates module symlinks at the filesystem root and writes .gitconfig, so
  # it cannot run as non-root or with a read-only root fs. Keep default as {}
  # (use image default), or override explicitly for your threat model.
  securityContext: {}

# =============================================================================
# Worker Service Configuration
# =============================================================================
worker:
  # -- Pod-container securityContext for the worker container. The worker
  # image's entrypoint clones module repos and symlinks them at the
  # filesystem root, so it cannot run non-root. Keep {} to use the image
  # default, or override for your threat model.
  securityContext: {}

  # -- Port the worker exposes Prometheus metrics + /ready on.
  # Used by livenessProbe / readinessProbe / startupProbe.
  metricsPort: 9090

  healthCheck:
    # -- Enable HTTP probes against the worker's /ready endpoint on
    # `metricsPort`. Only the new TS-compiled worker
    # (packages/api/src/workers/job-worker.ts) exposes that endpoint;
    # the image's default CMD still runs the legacy
    # scripts/workers/job-worker.js, which has no HTTP surface and will
    # CrashLoopBackOff under these probes.
    #
    # Set `false` while a brand is still on the legacy worker (handler
    # + cron migration to module-defined queues incomplete). Re-enable
    # once the module migration ships.
    enabled: true

# =============================================================================
# Scheduler Service Configuration
# =============================================================================
scheduler:
  # -- Port the scheduler exposes Prometheus metrics + /ready on.
  metricsPort: 9091

  healthCheck:
    # -- Enable HTTP probes against the scheduler's /ready endpoint AND
    # the chart's command override that points at the new TS-compiled
    # scheduler entrypoint (packages/api/src/scheduler/start-scheduler.ts).
    # Both are paired: the new scheduler reads module-defined `crons[]`
    # config; the legacy scheduler at scripts/scheduler/start-scheduler.js
    # reads `module.schedulers[]` (in-process cron) and has no HTTP
    # surface for probes.
    #
    # Set `false` while a brand is still on the legacy scheduler. The
    # image's default CMD then runs and probes are omitted.
    enabled: true

# =============================================================================
# Custom Domains Module
# =============================================================================
customDomains:
  # -- Enable the custom domain controller
  enabled: false
  controller:
    image:
      registry: ghcr.io/gatewaze
      repository: custom-domain-controller
      tag: latest
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
  # -- CNAME target for DNS verification (e.g., custom.myplatform.com)
  cnameTarget: ""
  # -- Expected ingress IP for A record verification
  expectedIp: ""
  # -- cert-manager ClusterIssuer name
  clusterIssuer: "letsencrypt-prod"
  # -- Poll interval in seconds
  pollInterval: 60
  # -- Create RBAC resources for the controller
  rbac:
    create: true
