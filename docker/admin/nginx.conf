# Override nginx's default mime.types so .mjs is served as JavaScript.
# Without this, browsers reject pdf.worker.min-*.mjs (shipped by pdfjs-dist
# 5.x) under strict MIME-type checking for module scripts and the PDF
# template editor falls back to a broken "fake worker".
types {
    application/javascript  mjs;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    default_type application/octet-stream;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Cross-origin isolation — unlocks SharedArrayBuffer for the
    # event-invites PDF generator (@pdf-lib/fontkit + brotli WASM).
    # Without COOP+COEP, modern browsers throw `ReferenceError:
    # SharedArrayBuffer is not defined` from the lib's brotli decoder
    # and the React error boundary blanks the whole tab.
    #
    # `same-origin` for COOP: standard isolation requirement.
    # `credentialless` for COEP: looser than `require-corp` — cross-
    # origin requests just have their credentials stripped instead of
    # requiring every fetched resource to send a CORP header. This
    # works with our Supabase API calls (already bearer-token-based,
    # no cookies) without needing Supabase to change anything.
    # Supported in Chrome 96+, Firefox 110+, Safari 16.4+.
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "credentialless" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # Cache static assets for 1 year (they have content hashes)
    location ~* \.(js|mjs|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA routing: serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint
    location /healthz {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
