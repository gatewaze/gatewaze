###############################################################################
# Gatewaze Full Stack — Self-Hosted Supabase + Application Services
#
# Uses Traefik reverse proxy for clean .localhost domains:
#   - http://admin.gatewaze.localhost   → Admin dashboard
#   - http://app.gatewaze.localhost     → Public portal
#   - http://api.gatewaze.localhost     → API server
#   - http://supabase.gatewaze.localhost → Supabase API (Kong)
#   - http://studio.gatewaze.localhost  → Supabase Studio
#
# Usage:
#   cp .env.example .env   # edit values
#   docker compose up -d
###############################################################################

services:
  # ---------------------------------------------------------------------------
  # Supabase Infrastructure
  # ---------------------------------------------------------------------------

  supabase-db:
    image: supabase/postgres:15.8.1.085
    container_name: ${COMPOSE_PROJECT_NAME:-gatewaze}-supabase-db
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-54322}:5432"
    environment:
      POSTGRES_HOST: /var/run/postgresql
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGPORT: "5432"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: ${JWT_EXP:-3600}
    volumes:
      - supabase-db-data:/var/lib/postgresql/data
      - ./supabase/00-set-admin-password.sh:/docker-entrypoint-initdb.d/00-set-admin-password.sh:ro
      - ../supabase/migrations:/gatewaze-migrations:ro
      - ./supabase/zz-gatewaze-init.sh:/docker-entrypoint-initdb.d/zz-gatewaze-init.sh:ro
      - ./supabase/db-healthcheck.sh:/usr/local/bin/db-healthcheck.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "sh /usr/local/bin/db-healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 300s
    networks:
      - gatewaze

  supabase-auth:
    image: supabase/gotrue:v2.186.0
    container_name: ${COMPOSE_PROJECT_NAME:-gatewaze}-supabase-auth
    restart: unless-stopped
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: "9999"
      API_EXTERNAL_URL: ${API_EXTERNAL_URL:-http://supabase.gatewaze.localhost}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@supabase-db:5432/${POSTGRES_DB:-postgres}
      GOTRUE_SITE_URL: ${SITE_URL:-http://admin.gatewaze.localhost}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS:-}
      GOTRUE_DISABLE_SIGNUP: ${DISABLE_SIGNUP:-false}
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: ${JWT_EXP:-3600}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: ${ENABLE_EMAIL_SIGNUP:-true}
      GOTRUE_MAILER_AUTOCONFIRM: ${ENABLE_EMAIL_AUTOCONFIRM:-false}
      GOTRUE_SMTP_HOST: ${SMTP_HOST:-smtp.sendgrid.net}
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-587}
      GOTRUE_SMTP_USER: ${SMTP_USER:-apikey}
      GOTRUE_SMTP_PASS: ${SMTP_PASS:-${SENDGRID_API_KEY:-}}
      GOTRUE_SMTP_ADMIN_EMAIL: ${EMAIL_FROM:-${SMTP_ADMIN_EMAIL:-admin@localhost}}
      GOTRUE_SMTP_MAX_FREQUENCY: 1ns
      GOTRUE_MAILER_URLPATHS_INVITE: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_RECOVERY: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: /auth/v1/verify
      GOTRUE_EXTERNAL_PHONE_ENABLED: "false"
      GOTRUE_SMS_AUTOCONFIRM: "true"
      # Custom email templates (mounted via volume below). Removes the
      # OTP code block from the default magic-link template since the
      # portal UI doesn't offer a code entry surface.
      # MUST use the file:// scheme so GoTrue reads from the mounted
      # volume; without a scheme, GoTrue treats the value as an HTTP
      # path relative to SITE_URL and tries to fetch the template,
      # which deadlocks the request with a 504 (the admin container
      # does not serve /email-templates/).
      GOTRUE_MAILER_TEMPLATES_MAGIC_LINK: file:///email-templates/magic_link.html
      GOTRUE_MAILER_SUBJECTS_MAGIC_LINK: ${MAGIC_LINK_SUBJECT:-Sign in to ${INSTANCE_NAME:-Gatewaze}}
    volumes:
      - ./supabase/email-templates:/email-templates:ro
    networks:
      - gatewaze

  supabase-rest:
    image: postgrest/postgrest:v14.5
    container_name: ${COMPOSE_PROJECT_NAME:-gatewaze}-supabase-rest
    restart: unless-stopped
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@supabase-db:5432/${POSTGRES_DB:-postgres}
      PGRST_DB_SCHEMAS: ${PGRST_DB_SCHEMAS:-public,storage,graphql_public}
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: ${JWT_EXP:-3600}
      PGRST_DB_CHANNEL_ENABLED: "true"
    command: postgrest
    networks:
      - gatewaze

  supabase-realtime:
    image: supabase/realtime:v2.76.5
    container_name: ${COMPOSE_PROJECT_NAME:-gatewaze}-supabase-realtime
    restart: unless-stopped
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      PORT: "4000"
      DB_HOST: supabase-db
      DB_PORT: "5432"
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-postgres}
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-UpNVntn3cDxHJpq99YMc1T1AQgQpc8kfYTuRgBiYa15BLrx8etQoXz3gZv1/u2oq}
      ERL_AFLAGS: "-proto_dist inet_tcp"
      ENABLE_TAILSCALE: "false"
      DNS_NODES: "''"
      APP_NAME: realtime
      SEED_SELF_HOST: "true"
    networks:
      - gatewaze

  supabase-storage:
    image: supabase/storage-api:v1.37.8
    container_name: ${COMPOSE_PROJECT_NAME:-gatewaze}-supabase-storage
    restart: unless-stopped
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-rest:
        condition: service_started
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://supabase-rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@supabase-db:5432/${POSTGRES_DB:-postgres}
      FILE_SIZE_LIMIT: 5368709120
      STORAGE_BACKEND: ${STORAGE_BACKEND:-file}
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: ${S3_REGION:-stub}
      GLOBAL_S3_BUCKET: ${S3_BUCKET:-stub}
      GLOBAL_S3_ENDPOINT: ${S3_ENDPOINT:-}
      GLOBAL_S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-}
      ENABLE_IMAGE_TRANSFORMATION: "${ENABLE_IMAGE_TRANSFORMATION:-false}"
      IMGPROXY_URL: ${IMGPROXY_URL:-}
    volumes:
      - supabase-storage-data:/var/lib/storage
    networks:
      - gatewaze

  supabase-kong:
    image: kong:2.8.1
    container_name: ${COMPOSE_PROJECT_NAME:-gatewaze}-supabase-kong
    restart: unless-stopped
    ports:
      - "${KONG_PORT:-54321}:8000"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-gatewaze}-supabase.rule=Host(`${SUPABASE_HOST:-supabase.gatewaze.localhost}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-gatewaze}-supabase.entrypoints=web"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME:-gatewaze}-supabase.loadbalancer.server.port=8000"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      KONG_NGINX_PROXY_CLIENT_MAX_BODY_SIZE: 5g
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
    volumes:
      - ./supabase/kong.yml:/var/lib/kong/kong.yml.template:ro
      - ./supabase/kong-entrypoint.sh:/kong-entrypoint.sh:ro
    entrypoint: /kong-entrypoint.sh
    depends_on:
      supabase-auth:
        condition: service_started
      supabase-rest:
        condition: service_started
    networks:
      - gatewaze
      - traefik

  supabase-edge-functions:
    image: supabase/edge-runtime:v1.71.2
    container_name: ${COMPOSE_PROJECT_NAME:-gatewaze}-supabase-edge-functions
    restart: unless-stopped
    depends_on:
      supabase-kong:
        condition: service_started
    environment:
      JWT_SECRET: ${JWT_SECRET}
      SUPABASE_URL: http://supabase-kong:8000
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      SUPABASE_DB_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@supabase-db:5432/${POSTGRES_DB:-postgres}
      # VERIFY_JWT defaults to true so edge functions reject unverified
      # tokens out of the box. Set VERIFY_JWT=false in .env only for
      # local development that explicitly needs to bypass JWT checks.
      VERIFY_JWT: "${VERIFY_JWT:-true}"
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-none}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@localhost}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Gatewaze}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      GW_APP_NAME: ${GW_APP_NAME:-}
      CI_MODE: "${CI_MODE:-false}"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REFRESH_TOKEN: ${GOOGLE_REFRESH_TOKEN:-}
      GOOGLE_SHEETS_CLIENT_ID: ${GOOGLE_SHEETS_CLIENT_ID:-}
      GOOGLE_SHEETS_CLIENT_SECRET: ${GOOGLE_SHEETS_CLIENT_SECRET:-}
      GOOGLE_SHEETS_REFRESH_TOKEN: ${GOOGLE_SHEETS_REFRESH_TOKEN:-}
    volumes:
      - ../supabase/functions:/home/deno/functions
      - deno-cache:/root/.cache/deno
    command:
      - start
      - --main-service
      - /home/deno/functions/main
    networks:
      - gatewaze

  supabase-meta:
    image: supabase/postgres-meta:v0.96.1
    container_name: ${COMPOSE_PROJECT_NAME:-gatewaze}-supabase-meta
    restart: unless-stopped
    environment:
      PG_META_PORT: 8080
      PG_META_DB_URL: postgresql://supabase_admin:${POSTGRES_PASSWORD}@supabase-db:5432/${POSTGRES_DB:-postgres}
    depends_on:
      supabase-db:
        condition: service_healthy
    networks:
      - gatewaze

  supabase-studio:
    image: supabase/studio:2026.02.16-sha-26c615c
    container_name: ${COMPOSE_PROJECT_NAME:-gatewaze}-supabase-studio
    restart: unless-stopped
    ports:
      - "${STUDIO_PORT:-54323}:3000"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-gatewaze}-studio.rule=Host(`${STUDIO_HOST:-studio.gatewaze.localhost}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-gatewaze}-studio.entrypoints=web"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME:-gatewaze}-studio.loadbalancer.server.port=3000"
    environment:
      HOSTNAME: "0.0.0.0"
      STUDIO_PG_META_URL: http://supabase-meta:8080
      POSTGRES_HOST: supabase-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      AUTH_JWT_SECRET: ${JWT_SECRET}
      DEFAULT_ORGANIZATION_NAME: ${STUDIO_DEFAULT_ORGANIZATION:-Gatewaze}
      DEFAULT_PROJECT_NAME: ${STUDIO_DEFAULT_PROJECT:-Gatewaze}
      SUPABASE_URL: http://supabase-kong:8000
      SUPABASE_PUBLIC_URL: ${API_EXTERNAL_URL:-http://supabase.gatewaze.localhost}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      NEXT_PUBLIC_ENABLE_LOGS: "false"
      NEXT_ANALYTICS_BACKEND_PROVIDER: postgres
      EDGE_FUNCTIONS_MANAGEMENT_FOLDER: /app/edge-functions
    volumes:
      - ../supabase/functions:/app/edge-functions:ro
    depends_on:
      supabase-meta:
        condition: service_started
      supabase-kong:
        condition: service_started
    networks:
      - gatewaze
      - traefik

  # ---------------------------------------------------------------------------
  # Application Infrastructure
  # ---------------------------------------------------------------------------

  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-gatewaze}-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-gatewaze}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-gatewaze}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gatewaze

  # ---------------------------------------------------------------------------
  # Gatewaze Application Services
  # ---------------------------------------------------------------------------

  admin:
    build:
      context: ..
      dockerfile: docker/admin/Dockerfile
      args:
        VITE_SUPABASE_URL: ${SUPABASE_URL:-http://supabase.gatewaze.localhost}
        VITE_SUPABASE_ANON_KEY: ${ANON_KEY}
        VITE_API_URL: ${API_URL:-http://api.gatewaze.localhost}
        VITE_AUTH_PROVIDER: ${AUTH_PROVIDER:-supabase}
        VITE_DISABLE_BRANDING: ${DISABLE_BRANDING:-false}
        VITE_APP_NAME: ${GW_APP_NAME:-}
    container_name: ${COMPOSE_PROJECT_NAME:-gatewaze}-admin
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-5274}:80"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-gatewaze}-admin.rule=Host(`${ADMIN_HOST:-admin.gatewaze.localhost}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-gatewaze}-admin.entrypoints=web"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME:-gatewaze}-admin.loadbalancer.server.port=80"
    environment:
      VITE_SUPABASE_URL: ${SUPABASE_URL:-http://supabase.gatewaze.localhost}
      VITE_SUPABASE_ANON_KEY: ${ANON_KEY}
      VITE_API_URL: ${API_URL:-http://api.gatewaze.localhost}
      VITE_PORTAL_DOMAIN: ${PORTAL_HOST:-app.gatewaze.localhost}
      VITE_APP_URL: http://${PORTAL_HOST:-app.gatewaze.localhost}
      VITE_APP_NAME: ${GW_APP_NAME:-}
      MODULE_SOURCES: ${MODULE_SOURCES:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GATEWAZE_DATA_DIR: /var/lib/gatewaze
    volumes:
      # Read the live module tree + sources cache produced by the API.
      # Supervisor writes .rebuild-status-admin under the same modules/ path.
      - gatewaze-module-sources:/var/lib/gatewaze/sources:ro
      - gatewaze-module-live:/var/lib/gatewaze/modules
    depends_on:
      supabase-kong:
        condition: service_started
    networks:
      - gatewaze
      - traefik

  portal:
    build:
      context: ..
      dockerfile: docker/portal/Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-gatewaze}-portal
    restart: unless-stopped
    ports:
      - "${PORTAL_PORT:-3100}:3100"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      # Portal routes both `app.<brand>.localhost` and the sites regex
      # (`<slug>.sites.<brand>.localhost`). The brand env file sets
      # PORTAL_TRAEFIK_RULE; falls back to a Host-only rule if absent.
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-gatewaze}-portal.rule=${PORTAL_TRAEFIK_RULE:-Host(`${PORTAL_HOST:-app.gatewaze.localhost}`)}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-gatewaze}-portal.entrypoints=web"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME:-gatewaze}-portal.loadbalancer.server.port=3100"
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL:-http://supabase.gatewaze.localhost}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
      NEXT_PUBLIC_API_URL: ${API_URL:-http://api.gatewaze.localhost}
      # Public portal URL used by server-rendered pages + confirmation links.
      # Falls back to http://$PORTAL_HOST (set in the brand env file).
      NEXT_PUBLIC_APP_URL: ${PORTAL_URL:-http://${PORTAL_HOST}}
      SUPABASE_URL: ${SUPABASE_INTERNAL_URL:-http://supabase-kong:8000}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      NEXT_PUBLIC_ENABLE_CHAT: ${NEXT_PUBLIC_ENABLE_CHAT:-false}
      INSTANCE_NAME: ${INSTANCE_NAME:-gatewaze}
      NODE_ENV: production
      # Email sender identity for transactional emails (calendar signup
      # confirmation, member blasts). Must match a verified SendGrid sender.
      EMAIL_FROM: ${EMAIL_FROM:-}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-}
      # Domain for calendar email group addresses ({slug}@{domain}).
      # Falls back to the domain part of EMAIL_FROM at runtime if unset.
      CALENDAR_EMAIL_DOMAIN: ${CALENDAR_EMAIL_DOMAIN:-}
      # Module sources (comma-separated). Each entry may be a git URL
      # (optionally `#branch=X&path=Y`) or a local absolute path. Git
      # URLs are cloned by the entrypoint; local paths are expected to
      # be volume-mounted at that same absolute path.
      MODULE_SOURCES: ${MODULE_SOURCES:-}
      GATEWAZE_DATA_DIR: /var/lib/gatewaze
    volumes:
      - gatewaze-module-sources:/var/lib/gatewaze/sources:ro
      - gatewaze-module-live:/var/lib/gatewaze/modules
    depends_on:
      supabase-kong:
        condition: service_started
    networks:
      - gatewaze
      - traefik

  api:
    build:
      context: ..
      dockerfile: docker/api/Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-gatewaze}-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3002}:3002"
    # Resolve the brand's `*.localhost` Supabase hostname (the one the
    # browser uses) to the host gateway. Without this, the api
    # container can't reach a `${SUPABASE_HOST}` URL stored in the
    # `environments` table — getaddrinfo ENOTFOUND. Fixes the env-sync
    # push/pull from inside docker. Internal-network calls keep using
    # SUPABASE_URL=http://supabase-kong:8000 unaffected.
    extra_hosts:
      - "${SUPABASE_HOST:-supabase.gatewaze.localhost}:host-gateway"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-gatewaze}-api.rule=Host(`${API_HOST:-api.gatewaze.localhost}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-gatewaze}-api.entrypoints=web"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME:-gatewaze}-api.loadbalancer.server.port=3002"
    volumes:
      # Persist runtime git clones and uploaded modules across restarts
      - api-modules-cache:/app/.gatewaze-modules
      - api-data:/app/data
      - gatewaze-data:/var/lib/gatewaze
      # Dual-tree: API is the sole writer of sources/ and modules/
      - gatewaze-module-sources:/var/lib/gatewaze/sources
      - gatewaze-module-live:/var/lib/gatewaze/modules
    environment:
      PORT: "3002"
      NODE_ENV: production
      SUPABASE_URL: http://supabase-kong:8000
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      REDIS_URL: redis://:${REDIS_PASSWORD:-gatewaze}@redis:6379
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@supabase-db:5432/${POSTGRES_DB:-postgres}
      JWT_SECRET: ${JWT_SECRET}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@localhost}
      # Module system v1.1 configuration
      GATEWAZE_DATA_DIR: /var/lib/gatewaze
      DISABLE_MODULE_UPLOAD: ${DISABLE_MODULE_UPLOAD:-false}
      BULLMQ_PREFIX: ${BULLMQ_PREFIX:-gatewaze}
      AUDIT_LOG_RETENTION_DAYS: ${AUDIT_LOG_RETENTION_DAYS:-90}
      API_KEY_PEPPER: ${API_KEY_PEPPER:-}
      MODULE_SOURCES: ${MODULE_SOURCES:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      # AI provider keys — used by lazy-loaded clients in scrapers and
      # content-pipeline (e.g. luma speaker extractor, embeddings).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
      supabase-db:
        condition: service_healthy
    networks:
      - gatewaze
      - traefik

  worker:
    build:
      context: ..
      dockerfile: docker/worker/Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-gatewaze}-worker
    restart: unless-stopped
    shm_size: '1gb'
    environment:
      NODE_ENV: production
      BRAND: ${BRAND:-default}
      SUPABASE_URL: http://supabase-kong:8000
      SUPABASE_PUBLIC_URL: ${API_EXTERNAL_URL:-http://supabase.gatewaze.localhost}
      VITE_SUPABASE_URL: http://supabase-kong:8000
      SUPABASE_ANON_KEY: ${ANON_KEY}
      VITE_SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      REDIS_URL: redis://:${REDIS_PASSWORD:-gatewaze}@redis:6379
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@supabase-db:5432/${POSTGRES_DB:-postgres}
      JWT_SECRET: ${JWT_SECRET}
      SCRAPER_MODULE_PATH: /premium-gatewaze-modules/modules/scrapers/scripts
      BRAVE_SEARCH_API_KEY: ${BRAVE_SEARCH_API_KEY:-}
      GOOGLE_CSE_API_KEY: ${GOOGLE_CSE_API_KEY:-}
      GOOGLE_CSE_ID: ${GOOGLE_CSE_ID:-}
      GOOGLE_CSE_DAILY_BUDGET: ${GOOGLE_CSE_DAILY_BUDGET:-100}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-1}
      MODULE_SOURCES: ${MODULE_SOURCES:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GATEWAZE_DATA_DIR: /var/lib/gatewaze
      # spec-scrapling-fetcher-service §4.2 — adapter calls these to reach
      # the new Python service. When unset the adapter raises
      # ScraplingNotConfiguredError and the *Fast scrapers fall back to
      # their existing Puppeteer paths.
      SCRAPLING_FETCHER_URL: http://scrapling-fetcher:8080
      SCRAPLING_INTERNAL_TOKEN: ${SCRAPLING_INTERNAL_TOKEN:-}
    volumes:
      - ${PREMIUM_MODULES_PATH:-../../premium-gatewaze-modules}:/premium-gatewaze-modules
      - gatewaze-module-sources:/var/lib/gatewaze/sources:ro
      - gatewaze-module-live:/var/lib/gatewaze/modules:ro
    depends_on:
      redis:
        condition: service_healthy
      supabase-db:
        condition: service_healthy
    networks:
      - gatewaze

  # ---------------------------------------------------------------------------
  # scrapling-fetcher — Python sidecar exposing Scrapling's Fetcher /
  # StealthyFetcher / DynamicFetcher behind one HTTP endpoint. Used by
  # the *Fast Luma scraper variants for the per-event-page fetches that
  # don't need a browser. See gatewaze-environments/specs/spec-scrapling-fetcher-service.md
  # ---------------------------------------------------------------------------
  scrapling-fetcher:
    build:
      context: ../../gatewaze-environments/services/scrapling-fetcher
    container_name: ${COMPOSE_PROJECT_NAME:-gatewaze}-scrapling-fetcher
    restart: unless-stopped
    networks:
      - gatewaze
    environment:
      SCRAPLING_INTERNAL_TOKEN: ${SCRAPLING_INTERNAL_TOKEN:-}
      SCRAPLING_PROXY_PROVIDER: ${SCRAPLING_PROXY_PROVIDER:-none}
      SCRAPLING_PROXY_CONFIG: ${SCRAPLING_PROXY_CONFIG:-}
      SCRAPLING_PROXY_MODE: ${SCRAPLING_PROXY_MODE:-none}
      SCRAPLING_BROWSER_POOL_SIZE: ${SCRAPLING_BROWSER_POOL_SIZE:-4}
      SCRAPLING_FAST_CONCURRENCY: ${SCRAPLING_FAST_CONCURRENCY:-10}
      SCRAPLING_PER_DOMAIN_RPS: ${SCRAPLING_PER_DOMAIN_RPS:-5}
      SCRAPLING_DEFAULT_TIMEOUT_MS: ${SCRAPLING_DEFAULT_TIMEOUT_MS:-30000}
      SCRAPLING_PROXY_DAILY_GB_CAP: ${SCRAPLING_PROXY_DAILY_GB_CAP:-10}
      SCRAPLING_BRAND_ID: ${BRAND:-default}
      SUPABASE_URL: http://supabase-kong:8000
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/healthz').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 1G

  scheduler:
    build:
      context: ..
      dockerfile: docker/scheduler/Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-gatewaze}-scheduler
    restart: unless-stopped
    environment:
      NODE_ENV: production
      BRAND: ${BRAND:-default}
      SUPABASE_URL: http://supabase-kong:8000
      VITE_SUPABASE_URL: http://supabase-kong:8000
      SUPABASE_ANON_KEY: ${ANON_KEY}
      VITE_SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      REDIS_URL: redis://:${REDIS_PASSWORD:-gatewaze}@redis:6379
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@supabase-db:5432/${POSTGRES_DB:-postgres}
      JWT_SECRET: ${JWT_SECRET}
      MODULE_SOURCES: ${MODULE_SOURCES:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GATEWAZE_DATA_DIR: /var/lib/gatewaze
    volumes:
      - gatewaze-module-sources:/var/lib/gatewaze/sources:ro
      - gatewaze-module-live:/var/lib/gatewaze/modules:ro
    depends_on:
      redis:
        condition: service_healthy
      supabase-db:
        condition: service_healthy
    networks:
      - gatewaze

  # ---------------------------------------------------------------------------
  # umami — self-hosted analytics. Per spec-analytics-module §10.3
  # (local-dev parity). Reachable at analytics.<brand>.localhost via
  # Traefik. Same Postgres as the platform; Umami's tables live in a
  # separate `gatewaze_umami` database which the umami-init script below
  # creates idempotently.
  # ---------------------------------------------------------------------------
  umami-init:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-gatewaze}-umami-init
    restart: "no"
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      PGHOST: supabase-db
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER:-postgres}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: postgres
    entrypoint:
      - /bin/sh
      - -ec
      - |
        # Idempotent CREATE DATABASE / CREATE ROLE — local-dev parity for
        # the Helm pre-install Job in
        # premium-gatewaze-modules/modules/analytics/helm/templates/job-bootstrap-db.yaml.
        #
        # The GRANT to PGUSER is required because CREATE DATABASE ... OWNER
        # demands the connecting user be a member of the target owner role.
        # Idempotent — re-grants are no-ops.
        psql -v ON_ERROR_STOP=1 <<SQL
          DO \$\$
          BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'gatewaze_umami_role') THEN
              CREATE ROLE gatewaze_umami_role LOGIN PASSWORD 'gatewaze-umami-dev';
            END IF;
          END
          \$\$;
          GRANT gatewaze_umami_role TO "$${PGUSER}";
        SQL
        psql -v ON_ERROR_STOP=1 -tAc \
          "SELECT 1 FROM pg_database WHERE datname = 'gatewaze_umami'" \
          | grep -q 1 || \
          psql -v ON_ERROR_STOP=1 -c "CREATE DATABASE gatewaze_umami OWNER gatewaze_umami_role"
    networks:
      - gatewaze

  umami:
    # v3 lives on Docker Hub, not GHCR — the v3 release unified the
    # postgres + mysql builds (you pick via DATABASE_TYPE) so the
    # `postgresql-` tag prefix went away. Pin to a concrete version per
    # the codebase's "no :latest ghost-rollback" pattern. Upgrade from
    # v2 is one-shot: stop the container, bump this tag, restart —
    # Umami auto-runs the schema migration on first startup. BACK UP
    # gatewaze_umami first; the migration is irreversible.
    image: docker.io/umamisoftware/umami:3.1.0
    container_name: ${COMPOSE_PROJECT_NAME:-gatewaze}-umami
    restart: unless-stopped
    depends_on:
      umami-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://gatewaze_umami_role:gatewaze-umami-dev@supabase-db:5432/gatewaze_umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${ANALYTICS_APP_SECRET:-dev-app-secret-change-me}
      DISABLE_TELEMETRY: "1"
      PROXY_TRUST: "1"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-gatewaze}-analytics.rule=Host(`${ANALYTICS_HOST:-analytics.gatewaze.localhost}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-gatewaze}-analytics.entrypoints=web"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME:-gatewaze}-analytics.loadbalancer.server.port=3000"
    networks:
      - gatewaze
      - traefik

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  supabase-db-data:
    driver: local
  supabase-storage-data:
    driver: local
  redis-data:
    driver: local
  api-modules-cache:
    driver: local
  api-data:
    driver: local
  gatewaze-data:
    driver: local
  deno-cache:
    driver: local
  # Dual-tree module storage (spec-module-deployment-overhaul §6.1):
  # API writes; admin/portal/worker read. Mounted at /var/lib/gatewaze/*.
  gatewaze-module-sources:
    driver: local
  gatewaze-module-live:
    driver: local

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  gatewaze:
    driver: bridge
  traefik:
    external: true
