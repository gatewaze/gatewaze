###############################################################################
# Gatewaze — Supabase Cloud Configuration
#
# Use this compose file when connecting to Supabase Cloud (hosted).
# No Supabase services are started locally; all Supabase URLs and keys
# point to your Supabase Cloud project via .env variables.
#
# Uses Traefik reverse proxy for clean .localhost domains:
#   - http://gatewaze-admin.localhost   → Admin dashboard
#   - http://gatewaze-app.localhost     → Public portal
#   - http://gatewaze-api.localhost     → API server
#
# Usage:
#   cp .env.example .env   # configure SUPABASE_URL, keys, etc.
#   docker compose -f docker-compose.cloud.yml up -d
###############################################################################

services:
  # ---------------------------------------------------------------------------
  # Traefik Reverse Proxy
  # ---------------------------------------------------------------------------

  traefik:
    image: traefik:v2.11
    container_name: gatewaze-traefik
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"   # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - gatewaze

  # ---------------------------------------------------------------------------
  # Application Infrastructure
  # ---------------------------------------------------------------------------

  redis:
    image: redis:7-alpine
    container_name: gatewaze-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-gatewaze}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-gatewaze}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gatewaze

  # ---------------------------------------------------------------------------
  # Gatewaze Application Services
  # ---------------------------------------------------------------------------

  admin:
    build:
      context: ..
      dockerfile: docker/admin/Dockerfile
    container_name: gatewaze-admin
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin.rule=Host(`${ADMIN_HOST:-gatewaze-admin.localhost}`)"
      - "traefik.http.routers.admin.entrypoints=web"
      - "traefik.http.services.admin.loadbalancer.server.port=80"
    environment:
      VITE_SUPABASE_URL: ${SUPABASE_URL}
      VITE_SUPABASE_ANON_KEY: ${ANON_KEY}
      VITE_API_URL: ${API_URL:-http://gatewaze-api.localhost}
    networks:
      - gatewaze

  portal:
    build:
      context: ..
      dockerfile: docker/portal/Dockerfile
    container_name: gatewaze-portal
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portal.rule=Host(`${PORTAL_HOST:-gatewaze-app.localhost}`)"
      - "traefik.http.routers.portal.entrypoints=web"
      - "traefik.http.services.portal.loadbalancer.server.port=3100"
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      NODE_ENV: production
    networks:
      - gatewaze

  api:
    build:
      context: ..
      dockerfile: docker/api/Dockerfile
    container_name: gatewaze-api
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${API_HOST:-gatewaze-api.localhost}`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.services.api.loadbalancer.server.port=3002"
    environment:
      PORT: "3002"
      NODE_ENV: production
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      REDIS_URL: redis://:${REDIS_PASSWORD:-gatewaze}@redis:6379
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@localhost}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - gatewaze

  worker:
    build:
      context: ..
      dockerfile: docker/worker/Dockerfile
    container_name: gatewaze-worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      REDIS_URL: redis://:${REDIS_PASSWORD:-gatewaze}@redis:6379
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@localhost}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - gatewaze

  scheduler:
    build:
      context: ..
      dockerfile: docker/api/Dockerfile
    container_name: gatewaze-scheduler
    restart: unless-stopped
    command: ["node", "packages/api/dist/scheduler/start-scheduler.js"]
    environment:
      NODE_ENV: production
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      REDIS_URL: redis://:${REDIS_PASSWORD:-gatewaze}@redis:6379
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - gatewaze

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  redis-data:
    driver: local

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  gatewaze:
    driver: bridge
