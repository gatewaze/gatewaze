###############################################################################
# Development overrides — hot reload for admin, portal, api, worker, scheduler
#
# Usage: ./dev.sh <brand> up
#   (dev.sh automatically includes this file)
#
# Replaces production builds with dev servers that watch for file changes.
# Source directories are volume-mounted so edits are reflected immediately.
###############################################################################

services:
  admin:
    build:
      context: ..
      dockerfile: docker/admin/Dockerfile.dev
    volumes:
      - ../packages/admin/src:/app/packages/admin/src
      - ../packages/admin/public:/app/packages/admin/public
      - ../packages/admin/index.html:/app/packages/admin/index.html
      - ../packages/admin/vite.config.ts:/app/packages/admin/vite.config.ts
      - ../packages/admin/vite-plugin-gatewaze-modules.ts:/app/packages/admin/vite-plugin-gatewaze-modules.ts
      - ../packages/admin/tsconfig.json:/app/packages/admin/tsconfig.json
      - ../packages/shared/src:/app/packages/shared/src
      # Module system: config + external module sources
      - ../gatewaze.config.ts:/app/gatewaze.config.ts
      - ../../gatewaze-modules:/gatewaze-modules
      - ../../lf-gatewaze-modules:/lf-gatewaze-modules
    environment:
      NODE_ENV: development
      API_PROXY_TARGET: http://api:3002
      VITE_PORTAL_DOMAIN: ${PORTAL_HOST:-app.gatewaze.localhost}
      VITE_API_URL: ${API_URL:-http://api.gatewaze.localhost}
      # Docker Desktop on macOS doesn't propagate fsevents through bind
      # mounts, so Vite never sees host edits to /gatewaze-modules and serves
      # a stale bundle. Force chokidar polling inside the container so module
      # edits hot-reload. Native (non-container) dev leaves this unset and
      # keeps fast native fsevents.
      VITE_USE_POLLING: "true"

  portal:
    build:
      context: ..
      dockerfile: docker/portal/Dockerfile.dev
    volumes:
      - ../packages/portal/app:/app/packages/portal/app
      - ../packages/portal/components:/app/packages/portal/components
      - ../packages/portal/config:/app/packages/portal/config
      - ../packages/portal/data:/app/packages/portal/data
      - ../packages/portal/hooks:/app/packages/portal/hooks
      - ../packages/portal/lib:/app/packages/portal/lib
      - ../packages/portal/styles:/app/packages/portal/styles
      - ../packages/portal/types:/app/packages/portal/types
      - ../packages/portal/public:/app/packages/portal/public
      - ../packages/portal/scripts:/app/packages/portal/scripts
      - ../packages/portal/next.config.ts:/app/packages/portal/next.config.ts
      - ../packages/portal/tsconfig.json:/app/packages/portal/tsconfig.json
      - ../packages/portal/postcss.config.mjs:/app/packages/portal/postcss.config.mjs
      - ../packages/portal/tailwind.config.ts:/app/packages/portal/tailwind.config.ts
      - ../packages/portal/middleware.ts:/app/packages/portal/middleware.ts
      - ../packages/portal/package.json:/app/packages/portal/package.json
      - ../packages/shared/src:/app/packages/shared/src
      # Module system: config + external module sources
      - ../gatewaze.config.ts:/app/gatewaze.config.ts
      - ../../gatewaze-modules:/gatewaze-modules
      - ../../lf-gatewaze-modules:/lf-gatewaze-modules
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${API_URL:-http://api.gatewaze.localhost}
      # Internal Supabase URL for module registry generator (DB source lookup)
      # Self-hosted: http://supabase-kong:8000 (Docker network)
      # Cloud: same as SUPABASE_URL (set SUPABASE_INTERNAL_URL in .env)
      SUPABASE_URL: ${SUPABASE_INTERNAL_URL:-http://supabase-kong:8000}
      # EMAIL_FROM, EMAIL_FROM_NAME, NEXT_PUBLIC_APP_URL, and
      # SUPABASE_SERVICE_ROLE_KEY are inherited from the base
      # docker-compose.yml portal service definition.

  api:
    build:
      context: ..
      dockerfile: docker/api/Dockerfile.dev
    volumes:
      - ../packages/api/src:/app/packages/api/src
      - ../packages/api/tsconfig.json:/app/packages/api/tsconfig.json
      - ../packages/shared/src:/app/packages/shared/src
      # Module system: config + external module sources
      - ../gatewaze.config.ts:/app/gatewaze.config.ts
      - ../../gatewaze-modules:/gatewaze-modules
      - ../../lf-gatewaze-modules:/lf-gatewaze-modules
      # Git module source cache + uploaded modules (persist across restarts)
      - ../.gatewaze-modules:/app/.gatewaze-modules
      - ../data:/app/data
      # Edge functions: allow deployEdgeFunctions to write back to the host
      - ../supabase/functions:/app/supabase/functions
      # Docker socket: allow API to restart edge runtime after deploying functions
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      NODE_ENV: development
      EDGE_FUNCTIONS_CONTAINER: ${COMPOSE_PROJECT_NAME:-gatewaze}-supabase-edge-functions
      # Dev: no supervisor runs inside admin/portal, and HMR handles
      # source changes. So mark rebuild status "ok" the moment we bump
      # the counter — this keeps UI polling fast without lying about
      # production behaviour, which is gated by the real supervisor.
      DEV_AUTO_REBUILD_OK: "1"

  worker:
    build:
      context: ..
      dockerfile: docker/worker/Dockerfile.dev
    volumes:
      # Worker now runs packages/api/src/workers/job-worker.ts via tsx,
      # so it needs the same source mounts as the api service for
      # hot-reload (and loadModuleQueues to walk module sources). Keep
      # the legacy scripts/ mount too — some scraper paths still use it.
      - ../scripts:/app/scripts
      - ../packages/api/src:/app/packages/api/src
      - ../packages/api/tsconfig.json:/app/packages/api/tsconfig.json
      - ../packages/shared/src:/app/packages/shared/src
      - ../gatewaze.config.ts:/app/gatewaze.config.ts
      - ../../gatewaze-modules:/gatewaze-modules
      - ../../lf-gatewaze-modules:/lf-gatewaze-modules
      - ../.gatewaze-modules:/app/.gatewaze-modules
      - ../data:/app/data
    environment:
      NODE_ENV: development
      # Central Sending Service canary — worker owns the newsletter drip.
      SEND_ENGINE_USE_WORKER: ${SEND_ENGINE_USE_WORKER:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@localhost}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Gatewaze}
      UNSUBSCRIBE_HMAC_SECRET: ${UNSUBSCRIBE_HMAC_SECRET:-}
      SITE_URL: ${SITE_URL:-}
      # Internal API base the gatewaze-wiki MCP uses to reach the AI module's
      # /api/modules/ai/internal/wiki/* routes (service-to-service, internal-key
      # authed). spec-ai-memory-wiki.md §5.1.
      GATEWAZE_INTERNAL_API_URL: ${GATEWAZE_INTERNAL_API_URL:-http://api:3002}

  scheduler:
    build:
      context: ..
      dockerfile: docker/api/Dockerfile.dev
    command: ["pnpm", "tsx", "watch", "packages/api/src/scheduler/start-scheduler.ts"]
    volumes:
      - ../packages/api/src:/app/packages/api/src
      - ../packages/api/tsconfig.json:/app/packages/api/tsconfig.json
      - ../packages/shared/src:/app/packages/shared/src
      - ../gatewaze.config.ts:/app/gatewaze.config.ts
      - ../../gatewaze-modules:/gatewaze-modules
      - ../../lf-gatewaze-modules:/lf-gatewaze-modules
    environment:
      NODE_ENV: development
