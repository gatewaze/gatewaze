###############################################################################
# Shared Traefik Reverse Proxy
#
# Runs once and routes traffic to all brand instances via the shared
# "traefik" Docker network. Each brand stack connects to this network
# so Traefik can discover their containers.
#
# Managed automatically by dev.sh — no need to run manually.
###############################################################################

services:
  traefik:
    # v3.7+ required: Traefik v3.5's bundled Docker client is rejected with a
    # 400 by Docker Engine 29 (API 1.52), so its docker provider can't discover
    # containers and every route 404s. v3.7.4 negotiates Engine 29 correctly.
    image: traefik:v3.7.4
    container_name: gatewaze-traefik
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=traefik"
      - "--entrypoints.web.address=:80"
      - "--log.level=DEBUG"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - traefik

networks:
  traefik:
    name: traefik
    driver: bridge
