project_id = "gatewaze-local"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:5274"
additional_redirect_urls = ["http://127.0.0.1:3100", "http://gatewaze-app.localhost"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
otp_length = 6
otp_expiry = 3600

[auth.sms]
enable_signup = false
enable_confirmations = false

[auth.external.apple]
enabled = false

[auth.external.google]
enabled = false

[auth.rate_limit]
email_sent = 2
sms_sent = 30
token_refresh = 150
sign_in_sign_ups = 30

[edge_runtime]
enabled = true
policy = "per_worker"

[functions.platform-setup]
verify_jwt = false

[functions.email-sendgrid-webhook]
verify_jwt = false

[analytics]
enabled = true
port = 54327
backend = "postgres"
