<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="96x96" href="/theme/gatewaze/favicon-96x96.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin</title>

    <!-- Inter + Poppins are now self-hosted via @fontsource (imported in
         main.tsx) so they load same-origin and aren't affected by the
         admin nginx's Cross-Origin-Embedder-Policy: credentialless. The
         previous <link> to Google Fonts caused production to silently fall
         back to system fonts because the woff2 files served by
         fonts.gstatic.com didn't always pass the cross-origin-isolation
         requirement under COEP. localhost dev server doesn't set COEP, so
         it loaded fine there — which is why prod + localhost looked
         "slightly different". -->

    <style>
      @layer theme, base, vendor, components, utilities;
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!--
      runtime-config.js is generated by docker/admin/entrypoint.sh at
      pod startup from the runtime VITE_* env vars. It sets
      `window.__GATEWAZE_CONFIG__`, which the bundle reads in place of
      `import.meta.env.VITE_*` (substituted at build time by the
      `define` block in vite.config.ts).

      The inline bootstrap below ensures `window.__GATEWAZE_CONFIG__`
      is always defined as `{}` BEFORE /runtime-config.js loads, so
      the bundle's `globalThis.__GATEWAZE_CONFIG__.VITE_X` access is
      never a TypeError on missing config (esbuild's `define` only
      accepts identifier paths — no optional chaining — so the
      indirection has to live here, not in vite.config.ts).

      Plain `<script>` (no `type="module"`) executes synchronously
      before any deferred `<script type="module">`, so both globals
      are set before the bundle's top-level code runs.
    -->
    <script>window.__GATEWAZE_CONFIG__ = {};</script>
    <script src="/runtime-config.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
