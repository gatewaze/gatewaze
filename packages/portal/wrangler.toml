# Cloudflare Worker config for the AAIF Portal (per spec-portal-on-cloudflare-workers §5.1).
#
# This file targets a single brand (AAIF). Other brands will copy this and
# rename `name` / KV namespace IDs / R2 bucket. Per-brand wrangler files
# keep secrets isolated and let each brand deploy independently.
#
# OpenNext writes its build output to `.open-next/`. The generated
# `worker.js` is the Worker entrypoint; OpenNext also emits `assets/`
# (uploaded to the R2 bucket bound below).
#
# `[[routes]]` is INTENTIONALLY OMITTED for the v0 deploy. With a route
# bound to `aaif.live/*`, deploying the Worker would immediately
# steal traffic from the K8s ingress (Cloudflare manages the aaif.live
# zone). The Worker first goes live at
# `gatewaze-portal-aaif.<account>.workers.dev` — operator smoke-tests
# there, then adds `[[routes]]` back when ready to cut over (per
# docs/runbooks/portal-cloudflare-cutover.md Phase 4).
#
# Staging env block was removed too — wrangler 4's
# `workers/services/<name>/environments` API trips a "No route for
# that URI" error on this account (likely Workers Paid plan feature).
# Until that's resolved, "staging" is the same Worker on the
# workers.dev URL pre-cutover.

name = "gatewaze-portal-aaif"
main = ".open-next/worker.js"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# Static assets (Next.js public/, _next/static/, etc.) — uploaded by
# OpenNext's deploy step. The Worker streams them straight from R2.
[[r2_buckets]]
binding = "ASSETS"
bucket_name = "gatewaze-portal-aaif-assets"

# ISR cache — Next.js `revalidate: N` pages and fetch cache entries land
# here. OpenNext's kvIncrementalCache override (open-next.config.ts)
# expects this binding name verbatim — `NEXT_INC_CACHE_KV` — and 404s
# at deploy time if it's anything else.
[[kv_namespaces]]
binding = "NEXT_INC_CACHE_KV"
id = "79b6c1da1cbd41638c1ca2d11ad39471"

# Slug / custom-domain lookup cache — replaces the in-memory Maps in
# middleware.ts. 5-minute TTL per spec §4.4. Populated lazily by the
# middleware on first lookup.
[[kv_namespaces]]
binding = "SLUG_CACHE"
id = "979b2f4b6dde4248a4c3d5d0e8fd9c84"

# Public, non-secret config. Anything here is visible in the Worker
# bundle and to anyone who runs `wrangler tail`.
[vars]
GATEWAZE_API_URL = "https://api.aaif.live"
GATEWAZE_CDN_URL = "https://cdn.aaif.live"
NEXT_PUBLIC_SUPABASE_URL = "https://data.aaif.live"
NEXT_PUBLIC_BRAND = "aaif"

# Secrets are NOT declared here. They are set out-of-band:
#   wrangler secret put SUPABASE_ANON_KEY
#   wrangler secret put SUPABASE_JWT_SECRET   # only if the Worker verifies JWTs locally
# Service-role keys are NEVER bound to this Worker — it is a public
# surface. Per spec §8.
